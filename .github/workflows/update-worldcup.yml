name: Update World Cup bracket data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-worldcup-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update data from API-Football
        run: node scripts/update-api-football.mjs
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
      - name: Commit changed data
        run: |
          git config user.name "worldcup-bracket-bot"
          git config user.email "actions@github.com"
          git add data/matches.json
          git diff --cached --quiet || git commit -m "Update World Cup bracket data"
          git push
