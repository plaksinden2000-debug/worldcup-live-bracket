<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Плей-офф ЧМ-2026</title>
  <meta name="description" content="Живая сетка плей-офф ЧМ-2026 с флагами, свежими результатами и прогнозом на следующий матч." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;650;750;850&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050907;
      --panel: rgba(13, 24, 19, .86);
      --panel-2: rgba(19, 35, 29, .92);
      --line: rgba(255, 255, 255, .14);
      --text: #fff8e6;
      --muted: #b9c6bd;
      --gold: #f0c45b;
      --green: #38d48d;
      --red: #e85d5d;
      --blue: #75a7ff;
      --shadow: 0 24px 60px rgba(0, 0, 0, .36);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Manrope, Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(circle at 8% -8%, rgba(56, 212, 141, .22), transparent 28%),
        radial-gradient(circle at 88% 4%, rgba(240, 196, 91, .18), transparent 24%),
        linear-gradient(135deg, #050b08 0%, #082116 44%, #141f16 70%, #050907 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.78), transparent 88%);
    }

    .page {
      position: relative;
      width: min(1660px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 46px;
    }

    .topbar,
    .hero,
    .stats,
    .panel,
    .prediction {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, .06);
      backdrop-filter: blur(18px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: inherit;
      text-decoration: none;
      font-weight: 850;
      font-size: 21px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      color: #171006;
      background: linear-gradient(135deg, #ffe38c, #be7d23);
      box-shadow: inset 0 1px rgba(255,255,255,.55);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text);
      background: rgba(255,255,255,.08);
      font: inherit;
      font-size: 16px;
      font-weight: 850;
      text-decoration: none;
      cursor: pointer;
    }

    .btn-primary {
      color: #08120d;
      background: linear-gradient(135deg, #4ee7a1, #f0c45b);
      border-color: transparent;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 450px);
      gap: 16px;
      margin-top: 18px;
      padding: 20px;
      border-radius: 24px;
      overflow: hidden;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      max-width: 900px;
      font-size: clamp(46px, 5.8vw, 86px);
      line-height: .94;
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(30px, 3vw, 44px);
      line-height: 1;
      letter-spacing: 0;
    }

    .hero-card {
      display: grid;
      align-content: center;
      gap: 12px;
      min-height: 160px;
      padding: 24px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(56,212,141,.22), rgba(117,167,255,.12));
      border: 1px solid rgba(255,255,255,.16);
    }

    .kicker,
    .label,
    .match-meta {
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .hero-card strong {
      font-size: clamp(32px, 3.2vw, 48px);
      line-height: 1.04;
    }

    .hero-card span:last-child {
      color: #dfe9e2;
      font-size: 20px;
      font-weight: 750;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr .65fr 1fr;
      gap: 12px;
      margin-top: 16px;
      padding: 12px;
      border-radius: 20px;
    }

    .stat {
      min-width: 0;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255,255,255,.06);
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      color: #fff;
      font-size: clamp(22px, 2vw, 30px);
      line-height: 1.12;
      overflow-wrap: anywhere;
    }

    .panel,
    .prediction {
      margin-top: 18px;
      padding: 20px;
      border-radius: 24px;
    }

    .panel-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 12px;
      color: var(--gold);
      background: rgba(240,196,91,.10);
      border: 1px solid rgba(240,196,91,.25);
      font-weight: 850;
      font-size: 16px;
    }

    .bracket {
      display: grid;
      grid-template-columns: minmax(330px, 1.12fr) minmax(330px, 1.12fr) minmax(310px, .96fr) minmax(310px, .96fr);
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .stage {
      min-width: 310px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .stage-title {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 12px 4px;
      color: var(--gold);
      font-size: 20px;
      font-weight: 850;
    }

    .match-card {
      display: grid;
      gap: 10px;
      min-height: 214px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 16px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.095), rgba(255,255,255,.035)),
        linear-gradient(180deg, rgba(240,196,91,.055), transparent 42%);
      box-shadow: 0 16px 34px rgba(0, 0, 0, .22), inset 0 1px 0 rgba(255, 255, 255, .07);
    }

    .match-card.is-complete {
      border-color: rgba(56,212,141,.42);
      background: linear-gradient(145deg, rgba(56,212,141,.14), rgba(255,255,255,.045));
    }

    .match-card.is-live {
      border-color: rgba(232,93,93,.75);
      box-shadow: 0 0 0 1px rgba(232,93,93,.22);
    }

    .match-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      letter-spacing: 0;
      text-transform: none;
      font-size: 15px;
    }

    .pill {
      white-space: nowrap;
      color: var(--text);
      font-weight: 850;
    }

    .team {
      display: grid;
      grid-template-columns: 42px minmax(56px, auto) minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 8px;
      border-radius: 12px;
    }

    .team.is-winner {
      background: rgba(56,212,141,.16);
    }

    .team.is-placeholder {
      background: rgba(117,167,255,.08);
    }

    .team.is-placeholder .name {
      color: #d9e8ff;
      white-space: normal;
      line-height: 1.22;
    }

    .flag {
      display: block;
      width: 34px;
      height: 24px;
      border-radius: 6px;
      object-fit: cover;
      box-shadow: 0 0 0 1px rgba(255,255,255,.24), 0 7px 16px rgba(0,0,0,.22);
    }

    .flag-empty {
      display: grid;
      place-items: center;
      color: var(--gold);
      background: rgba(255,255,255,.06);
      font-size: 17px;
      font-weight: 850;
      line-height: 1;
    }

    .match-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      vertical-align: middle;
    }

    .match-line .flag {
      flex: 0 0 auto;
    }

    .versus {
      color: var(--gold);
      opacity: .82;
      padding: 0 4px;
    }

    .code {
      display: inline-grid;
      place-items: center;
      height: 30px;
      border-radius: 10px;
      color: #07100c;
      background: var(--gold);
      font-size: 14px;
      font-weight: 850;
    }

    .name {
      min-width: 0;
      font-size: 18px;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score {
      color: var(--gold);
      font-size: 24px;
      font-weight: 850;
    }

    .route {
      display: grid;
      gap: 3px;
      margin-top: 2px;
      padding: 10px 11px;
      border-radius: 12px;
      color: #eaf6ee;
      background: rgba(56,212,141,.10);
      border: 1px solid rgba(56,212,141,.18);
      font-size: 15px;
      font-weight: 850;
    }

    .route small {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.25;
    }

    .forecast {
      display: grid;
      gap: 7px;
      padding: 10px 11px;
      border-radius: 12px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.10);
    }

    .forecast-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .chance {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 44px;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 850;
    }

    .chance-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
    }

    .chance-track span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--gold));
    }

    .forecast-muted,
    .forecast-decided {
      color: #e9fff5;
      font-size: 15px;
      font-weight: 850;
      line-height: 1.3;
    }

    .model-forecast {
      display: block;
    }

    .prediction {
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(380px, 1.05fr);
      gap: 18px;
      align-items: center;
      background: linear-gradient(135deg, rgba(14,28,23,.95), rgba(20,33,43,.92));
    }

    .prediction-form {
      display: grid;
      gap: 12px;
    }

    .winner-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .winner-options label {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 62px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.07);
      font-size: 19px;
      font-weight: 850;
      cursor: pointer;
    }

    .winner-options input {
      width: 20px;
      height: 20px;
      accent-color: var(--green);
    }

    .score-pick {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .score-pick label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .score-pick input {
      width: 100%;
      min-height: 58px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 16px;
      color: var(--text);
      background: rgba(0,0,0,.22);
      font: inherit;
      font-size: 24px;
      font-weight: 850;
      text-align: center;
    }

    .prediction-result {
      min-height: 48px;
      padding: 13px 14px;
      border-radius: 14px;
      color: #e9fff5;
      background: rgba(56,212,141,.12);
      font-size: 18px;
      font-weight: 750;
    }

    .error {
      padding: 18px;
      border-radius: 16px;
      color: #ffd7d7;
      background: rgba(232,93,93,.14);
      font-size: 18px;
      font-weight: 750;
    }

    @media (max-width: 980px) {
      .page { width: min(100% - 22px, 760px); padding-top: 14px; }
      .hero,
      .stats,
      .prediction { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .bracket { grid-template-columns: repeat(4, 310px); }
      h1 { font-size: clamp(44px, 13vw, 72px); }
    }

    @media (max-width: 560px) {
      .hero,
      .panel,
      .prediction { padding: 16px; }
      .winner-options,
      .score-pick { grid-template-columns: 1fr; }
      .btn { width: 100%; justify-content: center; }
      .actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; }
      .actions .btn-primary { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="brand" href="./" aria-label="Плей-офф ЧМ-2026">
        <span class="brand-mark">26</span>
        <span>ЧМ-2026</span>
      </a>
      <div class="actions">
        <a class="btn" href="#predict">Прогноз</a>
        <button id="refreshBtn" class="btn btn-primary" type="button">Обновить</button>
      </div>
    </header>

    <section class="hero">
      <div>
        <h1>Плей-офф ЧМ-2026</h1>
      </div>
      <aside class="hero-card" aria-label="Следующий матч">
        <span class="kicker">Следующий матч</span>
        <strong id="focusTitle">загрузка...</strong>
        <span id="focusMeta">обновляем данные</span>
      </aside>
    </section>

    <section class="stats" aria-label="Статус турнира">
      <div class="stat">
        <span class="label">Старт по Москве</span>
        <strong id="nextTimeStat">загрузка...</strong>
      </div>
      <div class="stat">
        <span class="label">Готово</span>
        <strong id="progressStat">0/0</strong>
      </div>
      <div class="stat">
        <span class="label">Дальше</span>
        <strong id="nextMatchStat">ожидание</strong>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Сетка</h2>
        <span class="badge" id="matchCount">0 матчей</span>
      </div>
      <div id="bracket" class="bracket"></div>
    </section>

    <section id="predict" class="prediction">
      <div>
        <p class="kicker">Прогноз</p>
        <h2 id="predictTitle">Следующий матч</h2>
      </div>
      <form id="predictionForm" class="prediction-form">
        <div id="winnerOptions" class="winner-options"></div>
        <div id="modelForecast" class="model-forecast"></div>
        <div class="score-pick">
          <label>
            <span id="scoreOneLabel">1</span>
            <input id="scoreOne" type="number" min="0" max="15" value="1" inputmode="numeric">
          </label>
          <label>
            <span id="scoreTwoLabel">2</span>
            <input id="scoreTwo" type="number" min="0" max="15" value="0" inputmode="numeric">
          </label>
        </div>
        <button class="btn btn-primary" type="submit">Сохранить прогноз</button>
        <div id="predictionResult" class="prediction-result">Выберите победителя и счёт</div>
      </form>
    </section>
  </main>

  <script>
    const DATA_URL = "data/matches.json";
    const POLL_MS = 60000;
    const stageOrder = { R16: 1, QF: 2, SF: 3, FINAL: 4 };
    const stageLabels = { R16: "1/8 финала", QF: "1/4 финала", SF: "1/2 финала", FINAL: "Финал" };
    const stageShortLabels = { R16: "1/8", QF: "1/4", SF: "1/2", FINAL: "Финал" };
    const flagAssets = {
      PAR: "py", FRA: "fr", CAN: "ca", MAR: "ma",
      POR: "pt", ESP: "es", USA: "us", BEL: "be",
      BRA: "br", NOR: "no", MEX: "mx", ENG: "gb-eng",
      ARG: "ar", EGY: "eg", SUI: "ch", COL: "co"
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function flagFor(code) {
      const asset = flagAssets[code];
      if (!asset) return `<span class="flag flag-empty" aria-hidden="true">◇</span>`;
      return `<img class="flag" alt="" loading="lazy" src="https://flagcdn.com/${asset}.svg">`;
    }

    function teamChip(team, mode = "code") {
      const code = team?.code || "TBD";
      const text = mode === "name" ? (team?.name || code) : code;
      return `<span class="match-line">${flagFor(code)}<span>${escapeHtml(text)}</span></span>`;
    }

    function isComplete(match) {
      return ["complete", "finished", "final", "ft", "aet", "pen"].includes(String(match.status || "").toLowerCase());
    }

    function isLive(match) {
      return ["live", "1h", "2h", "ht", "et", "p", "bt", "int"].includes(String(match.status || "").toLowerCase());
    }

    function scoreText(match) {
      if (match.score1 === null || match.score1 === undefined || match.score2 === null || match.score2 === undefined) return "";
      let text = `${match.score1}:${match.score2}`;
      if (match.penalty1 !== undefined && match.penalty1 !== null && match.penalty2 !== undefined && match.penalty2 !== null) {
        text += ` пен. ${match.penalty1}:${match.penalty2}`;
      }
      return text;
    }

    function matchWinner(match) {
      if (!match) return null;
      if (match.winner && match.winner !== "TBD") {
        const code = String(match.winner).toUpperCase();
        if (code === "TEAM1" || match.winner === 1) return match.team1;
        if (code === "TEAM2" || match.winner === 2) return match.team2;
        if (match.team1?.code === code) return match.team1;
        if (match.team2?.code === code) return match.team2;
      }
      if (!isComplete(match)) return null;
      if (typeof match.score1 === "number" && typeof match.score2 === "number") {
        if (match.score1 > match.score2) return match.team1;
        if (match.score2 > match.score1) return match.team2;
      }
      if (typeof match.penalty1 === "number" && typeof match.penalty2 === "number") {
        if (match.penalty1 > match.penalty2) return match.team1;
        if (match.penalty2 > match.penalty1) return match.team2;
      }
      return null;
    }

    function isPlaceholder(team) {
      return !team || !team.code || team.code === "TBD" || String(team.name || "").startsWith("Победитель:");
    }

    function hydrateBracket(data) {
      const hydrated = JSON.parse(JSON.stringify(data));
      const byId = new Map(hydrated.matches.map((match) => [match.id, match]));
      const ordered = [...hydrated.matches].sort((a, b) => (stageOrder[a.stage] || 99) - (stageOrder[b.stage] || 99) || (a.order || 0) - (b.order || 0));
      for (const match of ordered) {
        const winner = matchWinner(match);
        if (!winner || !match.nextMatchId || !match.nextSlot) continue;
        const next = byId.get(match.nextMatchId);
        if (!next) continue;
        if (match.nextSlot === "team1" && isPlaceholder(next.team1)) next.team1 = winner;
        if (match.nextSlot === "team2" && isPlaceholder(next.team2)) next.team2 = winner;
      }
      return hydrated;
    }

    function statusLabel(match) {
      if (isLive(match)) return "LIVE";
      if (isComplete(match)) return scoreText(match) || "FT";
      return formatMoscowKickoff(match);
    }

    function nextScheduledMatch(matches) {
      return matches
        .filter((match) => !isComplete(match))
        .sort((a, b) => new Date(a.kickoff || 0) - new Date(b.kickoff || 0))[0] || null;
    }

    function formatMoscowKickoff(match) {
      if (!match) return "финал";
      if (isLive(match)) return "идет сейчас";
      if (!match.kickoff) return match.kickoffLocal || "время уточняется";
      const date = new Date(match.kickoff);
      if (Number.isNaN(date.getTime())) return match.kickoffLocal || "время уточняется";
      return `${date.toLocaleString("ru-RU", {
        timeZone: "Europe/Moscow",
        day: "2-digit",
        month: "short",
        hour: "2-digit",
        minute: "2-digit"
      })} МСК`;
    }

    function matchCode(match) {
      if (!match) return "";
      if (match.stage === "FINAL") return "Финал";
      return `${stageShortLabels[match.stage] || match.stage}-${match.order || ""}`;
    }

    function teamName(team) {
      return team?.name || team?.code || "TBD";
    }

    function pairName(match) {
      return `${teamName(match.team1)} / ${teamName(match.team2)}`;
    }

    function sourceForSlot(match, slot, matches) {
      return matches.find((candidate) => candidate.nextMatchId === match.id && candidate.nextSlot === slot) || null;
    }

    function placeholderLabel(team, source) {
      if (!source) return team?.name || "команда определится";
      return `победитель ${matchCode(source)}: ${pairName(source)}`;
    }

    function routeDetail(next, slot, matches) {
      const opponentSlot = slot === "team1" ? "team2" : "team1";
      const opponent = next?.[opponentSlot];
      if (!opponent) return "";
      if (!isPlaceholder(opponent)) return `там: против ${teamName(opponent)}`;
      const source = sourceForSlot(next, opponentSlot, matches);
      return source ? `там: победитель ${matchCode(source)} (${pairName(source)})` : `там: ${teamName(opponent)}`;
    }

    function routeHtml(match, matches) {
      if (!match.nextMatchId) {
        return `<div class="route"><span>Победитель → чемпион</span><small>финальная точка сетки</small></div>`;
      }
      const next = matches.find((item) => item.id === match.nextMatchId);
      if (!next) return "";
      const winner = matchWinner(match);
      const prefix = winner ? `${escapeHtml(teamName(winner))} →` : "Победитель →";
      const detail = routeDetail(next, match.nextSlot, matches);
      return `
        <div class="route">
          <span>${prefix} ${escapeHtml(matchCode(next))}</span>
          ${detail ? `<small>${escapeHtml(detail)}</small>` : ""}
        </div>
      `;
    }

    function forecastValues(match) {
      const winner = matchWinner(match);
      if (winner) {
        return [match.team1, match.team2].map((team) => ({
          team,
          value: team?.code === winner.code ? 100 : 0
        }));
      }
      if (isPlaceholder(match.team1) || isPlaceholder(match.team2)) return null;
      const forecast = match.forecast || {};
      const first = Number(forecast.team1 ?? forecast[match.team1?.code]);
      const second = Number(forecast.team2 ?? forecast[match.team2?.code]);
      if (!Number.isFinite(first) || !Number.isFinite(second)) return null;
      const total = first + second;
      if (!total) return null;
      return [
        { team: match.team1, value: Math.round((first / total) * 100) },
        { team: match.team2, value: Math.round((second / total) * 100) }
      ];
    }

    function forecastHtml(match, compact = false) {
      const values = forecastValues(match);
      if (!values) {
        return `<div class="forecast forecast-muted">Шансы появятся после определения пары</div>`;
      }
      if (isComplete(match)) {
        const winner = values.find((item) => item.value === 100)?.team;
        return `<div class="forecast forecast-decided">Дальше: ${teamChip(winner, "name")}</div>`;
      }
      const rows = values.map((item) => `
        <div class="chance">
          <span>${escapeHtml(item.team?.code || "TBD")}</span>
          <div class="chance-track" aria-hidden="true"><span style="width:${Math.max(0, Math.min(100, item.value))}%"></span></div>
          <strong>${item.value}%</strong>
        </div>
      `).join("");
      return `
        <div class="forecast">
          <div class="forecast-title"><span>${compact ? "Шанс" : "Шанс прохода"}</span><span>модель</span></div>
          ${rows}
        </div>
      `;
    }

    function teamHtml(team, score, winnerCode, source) {
      const code = team?.code || "TBD";
      const placeholder = isPlaceholder(team);
      const name = placeholder ? placeholderLabel(team, source) : team?.name || "Пока неизвестно";
      const codeText = placeholder && source ? matchCode(source) : code;
      return `
        <div class="team ${winnerCode === code ? "is-winner" : ""} ${placeholder ? "is-placeholder" : ""}">
          ${flagFor(code)}
          <span class="code">${escapeHtml(codeText)}</span>
          <span class="name" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
          <span class="score">${score ?? "-"}</span>
        </div>
      `;
    }

    function renderBracket(data) {
      const bracket = document.getElementById("bracket");
      const matches = [...data.matches].sort((a, b) => (stageOrder[a.stage] || 99) - (stageOrder[b.stage] || 99) || (a.order || 0) - (b.order || 0));
      bracket.innerHTML = Object.keys(stageLabels).map((stage) => {
        const cards = matches.filter((match) => match.stage === stage).map((match) => {
          const winnerCode = matchWinner(match)?.code;
          const state = isLive(match) ? "is-live" : isComplete(match) ? "is-complete" : "";
          const team1Source = sourceForSlot(match, "team1", matches);
          const team2Source = sourceForSlot(match, "team2", matches);
          return `
            <article class="match-card ${state}">
              <div class="match-meta">
                <span>${escapeHtml(matchCode(match))}</span>
                <span class="pill">${escapeHtml(statusLabel(match))}</span>
              </div>
              ${teamHtml(match.team1, match.score1, winnerCode, team1Source)}
              ${teamHtml(match.team2, match.score2, winnerCode, team2Source)}
              ${forecastHtml(match)}
              ${routeHtml(match, matches)}
            </article>
          `;
        }).join("");
        return `<section class="stage"><div class="stage-title">${stageLabels[stage]}</div>${cards}</section>`;
      }).join("");
    }

    function updateDashboard(data) {
      const next = nextScheduledMatch(data.matches);
      const completed = data.matches.filter(isComplete).length;
      document.getElementById("nextTimeStat").textContent = formatMoscowKickoff(next);
      document.getElementById("progressStat").textContent = `${completed}/${data.matches.length}`;
      document.getElementById("matchCount").textContent = `${data.matches.length} матчей`;
      document.getElementById("nextMatchStat").innerHTML = next
        ? `${teamChip(next.team1)} <span class="versus">-</span> ${teamChip(next.team2)}`
        : "финал";
      document.getElementById("focusTitle").innerHTML = next
        ? `${teamChip(next.team1)} <span class="versus">-</span> ${teamChip(next.team2)}`
        : "Финал";
      document.getElementById("focusMeta").textContent = next ? formatMoscowKickoff(next) : "все матчи завершены";
    }

    function predictionKey(match) {
      return `worldcup-prediction-${match?.id || "none"}`;
    }

    function renderPrediction(data) {
      const next = nextScheduledMatch(data.matches);
      const title = document.getElementById("predictTitle");
      const options = document.getElementById("winnerOptions");
      const form = document.getElementById("predictionForm");
      const result = document.getElementById("predictionResult");
      const modelForecast = document.getElementById("modelForecast");
      const oneLabel = document.getElementById("scoreOneLabel");
      const twoLabel = document.getElementById("scoreTwoLabel");
      if (!next) {
        title.textContent = "Прогноз закрыт";
        form.style.display = "none";
        result.textContent = "Все матчи завершены";
        return;
      }

      form.style.display = "grid";
      const teamOne = next.team1 || { code: "TBD", name: "Команда 1" };
      const teamTwo = next.team2 || { code: "TBD", name: "Команда 2" };
      title.innerHTML = `${teamChip(teamOne, "name")} <span class="versus">-</span> ${teamChip(teamTwo, "name")}`;
      oneLabel.textContent = teamOne.code || "1";
      twoLabel.textContent = teamTwo.code || "2";
      modelForecast.innerHTML = forecastHtml(next, true);
      options.innerHTML = [teamOne, teamTwo].map((team, index) => `
        <label>
          <input type="radio" name="winner" value="${escapeHtml(team.code || `team${index + 1}`)}" ${index === 0 ? "checked" : ""}>
          ${flagFor(team.code)}
          <span>${escapeHtml(team.name || "TBD")}</span>
        </label>
      `).join("");

      const saved = JSON.parse(localStorage.getItem(predictionKey(next)) || "null");
      result.innerHTML = saved
        ? `Ваш прогноз: ${teamChip({ code: saved.winnerCode, name: saved.winnerName }, "name")}, счёт ${saved.scoreOne}:${saved.scoreTwo}`
        : "Выберите победителя и счёт";

      form.onsubmit = (event) => {
        event.preventDefault();
        const winnerCode = new FormData(form).get("winner");
        const winnerTeam = [teamOne, teamTwo].find((team) => team.code === winnerCode) || teamOne;
        const payload = {
          winnerName: winnerTeam.name,
          winnerCode: winnerTeam.code,
          scoreOne: document.getElementById("scoreOne").value || "0",
          scoreTwo: document.getElementById("scoreTwo").value || "0",
          savedAt: new Date().toISOString()
        };
        localStorage.setItem(predictionKey(next), JSON.stringify(payload));
        result.innerHTML = `Ваш прогноз: ${teamChip(winnerTeam, "name")}, счёт ${payload.scoreOne}:${payload.scoreTwo}`;
      };
    }

    function render(data) {
      const hydrated = hydrateBracket(data);
      updateDashboard(hydrated);
      renderBracket(hydrated);
      renderPrediction(hydrated);
    }

    async function loadData() {
      const response = await fetch(`${DATA_URL}?v=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`Не удалось загрузить данные: ${response.status}`);
      render(await response.json());
    }

    document.getElementById("refreshBtn").addEventListener("click", () => {
      loadData().catch((error) => {
        document.getElementById("bracket").innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
      });
    });

    loadData().catch((error) => {
      document.getElementById("bracket").innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
    });

    setInterval(() => loadData().catch(console.error), POLL_MS);
  </script>
</body>
</html>
